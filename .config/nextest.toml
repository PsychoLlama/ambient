# The dev live-upgrade e2e test spawns a real `ambient dev` server and
# hot-swaps processes over TCP under its own 60s wall-clock deadlines. Under
# the full parallel run it competes with ~1000 other tests (including 143
# subprocess-spawning integration tests) and starves into a timeout. Reserve
# all test threads so it runs alone — the effective "serial" execution for a
# single test (a max-threads=1 group would not stop the other subprocess
# tests from contending). Standalone it finishes in ~0.4s, so running it
# exclusively costs negligible wall-clock.
[[profile.default.overrides]]
filter = 'test(dev_loop_hot_swaps_processes_keeping_state)'
threads-required = 'num-test-threads'
